<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經數字占卜 - 正確版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line { height: 8px; margin: 4px 0; border-radius: 4px; transition: all 0.3s; }
        .yang { background-color: #1e293b; width: 100%; }
        .yin { display: flex; justify-content: space-between; width: 100%; }
        .yin div { background-color: #1e293b; width: 45%; height: 100%; border-radius: 4px; }
        .changing { background-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8">
        <h1 class="text-2xl font-bold text-center mb-6">梅花易數數字分析</h1>
        
        <input type="number" id="numInput" placeholder="輸入數字 (如: 61205702)" 
               class="w-full border-2 border-slate-200 rounded-xl p-4 text-xl mb-4 focus:border-blue-500 outline-none">
        
        <button onclick="analyze()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">
            計算卦象
        </button>

        <div id="result" class="mt-8 hidden border-t pt-6">
            <div id="hexagramDisplay" class="flex flex-col-reverse items-center mb-6 w-32 mx-auto">
                </div>
            <div class="space-y-2">
                <p class="text-sm text-slate-500 uppercase tracking-widest">分析結果</p>
                <h2 id="guaName" class="text-3xl font-black text-slate-800">卦名</h2>
                <p id="guaDesc" class="text-slate-600 leading-relaxed italic"></p>
            </div>
        </div>
    </div>

    <script>
        const trigrams = ["坤(地)", "乾(天)", "兌(澤)", "離(火)", "震(雷)", "巽(風)", "坎(水)", "艮(山)"];
        const linesMap = {
            "乾(天)": [1,1,1], "坤(地)": [0,0,0], "震(雷)": [1,0,0], "巽(風)": [0,1,1],
            "坎(水)": [0,1,0], "離(火)": [1,0,1], "艮(山)": [0,0,1], "兌(澤)": [1,1,0]
        };

        function analyze() {
            const val = document.getElementById('numInput').value;
            if (!val) return;

            // 1. Split and Sum
            const mid = Math.ceil(val.length / 2);
            const part1 = val.substring(0, mid).split('').reduce((a, b) => a + parseInt(b), 0);
            const part2 = val.substring(mid).split('').reduce((a, b) => a + parseInt(b), 0);
            const total = part1 + part2;

            // 2. Modulo Logic (Meihua Method)
            let upperIdx = part1 % 8; if(upperIdx === 0) upperIdx = 8;
            let lowerIdx = part2 % 8; if(lowerIdx === 0) lowerIdx = 8;
            let changeLine = total % 6; if(changeLine === 0) changeLine = 6;

            const upperGua = trigrams[upperIdx % 8];
            const lowerGua = trigrams[lowerIdx % 8];

            // 3. Render
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('guaName').innerText = `${upperGua} 上 ${lowerGua} 下`;
            document.getElementById('guaDesc').innerText = `動爻：第 ${changeLine} 爻。此卦象顯示能量在第 ${changeLine} 位發生變化，請注意相應的時機轉化。`;

            renderHexagram(linesMap[upperGua], linesMap[lowerGua], changeLine);
        }

        function renderHexagram(upperLines, lowerLines, change) {
            const container = document.getElementById('hexagramDisplay');
            container.innerHTML = '';
            const allLines = [...lowerLines, ...upperLines]; // Bottom up

            allLines.forEach((type, index) => {
                const isChanging = (index + 1) === change;
                const div = document.createElement('div');
                div.className = 'w-full';
                if (type === 1) {
                    div.innerHTML = `<div class="line yang ${isChanging ? 'changing' : ''}"></div>`;
                } else {
                    div.innerHTML = `<div class="line yin ${isChanging ? 'changing' : ''}"><div></div><div></div></div>`;
                }
                container.appendChild(div);
            });
        }
    </script>
</body>
</html>
