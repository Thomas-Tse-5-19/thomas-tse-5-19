<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>幸運數字分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f2f2f7; font-family: -apple-system, sans-serif; }
        .ios-input { background: #fff; border-radius: 12px; border: 1px solid #d1d1d6; padding: 16px; width: 100%; font-size: 18px; }
        .ios-btn { background: #007aff; color: white; border-radius: 12px; padding: 16px; font-weight: 600; width: 100%; transition: opacity 0.2s; }
        .ios-btn:active { opacity: 0.7; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto pt-10">
        <h1 class="text-3xl font-bold mb-2">數字占卜</h1>
        <p class="text-gray-500 mb-8">請輸入您的號碼進行解析</p>

        <div class="space-y-4">
            <input type="number" id="numInput" class="ios-input" placeholder="請輸入數字 (例如: 61205702)" inputmode="numeric">
            <button onclick="performLookup()" class="ios-btn">開始解析</button>
        </div>

        <div id="resultBox" class="mt-10 hidden animate-pulse">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                <span class="text-blue-600 font-bold tracking-widest text-xs uppercase" id="resElement">卦象名稱</span>
                <h2 class="text-4xl font-black mt-2 mb-4" id="resGua">--</h2>
                <hr class="my-4">
                <p class="text-gray-700 leading-relaxed text-lg" id="resDesc">請點擊按鈕進行查詢...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Data from Sheet "Calc" (Maps Number -> Hexagram Name)
        const calcData = {
            "61205702": "訟",
            "5702": "歸妹",
            "7": "損",
            "205": "大畜",
            "05": "小畜",
            "120": "未濟"
            // Add more mappings from your Excel sheet here
        };

        // 2. Data from Sheet "卦" (Maps Hexagram Name -> Description)
        const guaDescriptions = {
            "訟": "非常不好的卦，打官司，是非小人，要訂定仔細合同做事。",
            "歸妹": "回歸，再次或重新做一些事情，在感情上代表有三角關係。",
            "損": "先短期付出才會有成果。",
            "大畜": "豐收，農業上是非常好卦。",
            "小畜": "小收穫，做生意代表好卦。",
            "未濟": "很多事情需要處理好才能成功。"
            // Add more descriptions from your Excel sheet here
        };

        function performLookup() {
            const input = document.getElementById('numInput').value.trim();
            const resultBox = document.getElementById('resultBox');
            const resGua = document.getElementById('resGua');
            const resDesc = document.getElementById('resDesc');

            // Logic: A1 Lookup in Calc -> Result Lookup in 卦
            const guaName = calcData[input];

            if (guaName) {
                const description = guaDescriptions[guaName] || "找到卦象，但無相關描述。";
                resGua.innerText = guaName;
                resDesc.innerText = description;
                resultBox.classList.remove('hidden');
            } else {
                // Fuzzy Match: Check if input contains any known keys (optional)
                const matchedKey = Object.keys(calcData).find(key => input.includes(key));
                if (matchedKey) {
                    const foundGua = calcData[matchedKey];
                    resGua.innerText = foundGua;
                    resDesc.innerText = guaDescriptions[foundGua];
                    resultBox.classList.remove('hidden');
                } else {
                    alert("查無此數字之卦象，請確認輸入是否正確。");
                }
            }
        }
    </script>
</body>
</html>
